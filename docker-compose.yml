version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:80"
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - embeddings_data:/app/src/backend/data/embeddings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  embeddings_data:
